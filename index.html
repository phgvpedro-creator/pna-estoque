
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#1A2864"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Pe na Areia"/>
<title>Pe na Areia · Estoque</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:#FAF3EA;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:70px}
.header{background:#1A2864;padding:14px 16px;position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10}
.logo-text{color:white;font-weight:bold;font-size:16px;letter-spacing:1px}
.logo-sub{color:#F0B400;font-size:9px;letter-spacing:2px}
.stats{display:flex;gap:6px;margin-top:10px}
.stat{flex:1;background:rgba(255,255,255,0.08);border-radius:8px;padding:6px 4px;text-align:center}
.stat-v{font-weight:bold;font-size:11px;font-family:sans-serif}
.stat-l{color:rgba(255,255,255,0.4);font-size:8px;font-family:sans-serif}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;border-top:1px solid #e2e8f0;display:flex;z-index:20}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-top:3px solid transparent}
.nav-btn.active{border-top-color:#F0B400}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-family:sans-serif;color:#94a3b8}
.nav-btn.active .nav-label{color:#1A2864;font-weight:bold}
.content{padding:14px}
.card{background:white;border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:4px solid #10b981}
.card.zero{border-left-color:#ef4444}
.card.low{border-left-color:#f59e0b}
.card-name{font-weight:bold;font-size:14px;color:#1A2864}
.card-sub{font-size:11px;color:#94a3b8;font-family:sans-serif;margin-top:3px}
.card-qty{font-size:28px;font-weight:bold;font-family:sans-serif;line-height:1}
.card-un{font-size:10px;color:#94a3b8;font-family:sans-serif;text-align:right}
.cat-bar{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.cat-btn{background:white;color:#1A2864;border:1.5px solid #1A2864;border-radius:20px;padding:5px 12px;font-size:11px;white-space:nowrap;font-family:sans-serif;cursor:pointer}
.cat-btn.active{background:#1A2864;color:white;font-weight:bold}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:white;border-radius:24px 24px 0 0;padding:22px 20px 44px;width:100%;max-width:430px}
.modal-title{font-weight:bold;font-size:18px;color:#1A2864}
.modal-sub{font-size:12px;color:#94a3b8;font-family:sans-serif;margin-top:2px}
.tipo-btns{display:flex;gap:8px;margin:16px 0}
.tipo-btn{flex:1;padding:12px;border-radius:12px;border:none;font-family:sans-serif;font-size:14px;font-weight:bold;background:#f1f5f9;color:#94a3b8;cursor:pointer}
.tipo-btn.active-s{background:#1A2864;color:white}
.tipo-btn.active-e{background:#10b981;color:white}
.qtd-area{background:#f8fafc;border-radius:14px;padding:18px 16px;margin-bottom:14px}
.qtd-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px}
.qtd-btn{width:56px;height:56px;border-radius:50%;border:none;font-size:28px;font-weight:bold;cursor:pointer}
.qtd-num{font-size:52px;font-weight:bold;color:#1A2864;font-family:sans-serif;min-width:80px;text-align:center;line-height:1}
.quick-btns{display:flex;gap:8px}
.quick-btn{flex:1;padding:10px 0;border-radius:10px;border:1.5px solid #1A2864;background:white;color:#1A2864;font-size:15px;font-weight:bold;font-family:sans-serif;cursor:pointer}
.grat-toggle{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid #e2e8f0;background:#f8fafc;margin-bottom:14px;cursor:pointer}
.grat-toggle.on{background:#fef3c7;border-color:#F0B400}
.grat-circle{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:white}
.grat-circle.on{background:#F0B400}
select,input[type=text]{width:100%;padding:11px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:14px;font-family:sans-serif;color:#1A2864;outline:none;margin-bottom:10px}
.confirm-btn{width:100%;padding:15px;border-radius:14px;color:white;border:none;font-size:16px;font-weight:bold;font-family:sans-serif;cursor:pointer;margin-top:6px}
.hist-card{background:white;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid #10b981}
.hist-card.saida{border-left-color:#ef4444}
.hist-card.grat{border-left-color:#F0B400}
.hist-nome{font-weight:bold;font-size:13px;color:#1A2864}
.hist-meta{font-size:11px;color:#94a3b8;font-family:sans-serif;margin-top:2px}
.hist-qty{font-weight:bold;font-size:16px;font-family:sans-serif}
.res-card{background:white;border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.res-icon{font-size:26px}
.res-label{font-size:11px;color:#94a3b8;font-family:sans-serif}
.res-val{font-size:20px;font-weight:bold;font-family:sans-serif}
.prod-card{background:white;border-radius:12px;padding:12px 14px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.edit-btn{background:#1A78C8;border:none;border-radius:8px;color:white;padding:7px 11px;font-size:13px;cursor:pointer}
.del-btn{background:#fef2f2;border:none;border-radius:8px;color:#ef4444;padding:7px 11px;font-size:13px;cursor:pointer}
.add-btn{width:100%;margin-top:14px;padding:14px;border-radius:12px;background:white;border:2px dashed #1A2864;color:#1A2864;font-size:14px;font-family:sans-serif;cursor:pointer}
.toast{position:fixed;top:110px;left:50%;transform:translateX(-50%);background:#065f46;color:white;border-radius:20px;padding:10px 20px;font-size:13px;z-index:999;font-family:sans-serif;white-space:nowrap;display:none}
.toast.err{background:#7f1d1d}
.section-title{font-size:17px;font-weight:bold;color:#1A2864;margin-bottom:14px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.close-btn{background:#f1f5f9;border:none;border-radius:10px;padding:7px 12px;font-size:16px;cursor:pointer}
.edit-btn-sm{background:#f1f5f9;border:none;border-radius:10px;padding:7px 12px;font-size:13px;cursor:pointer;color:#1A2864}
.field-label{font-size:10px;color:#94a3b8;font-family:sans-serif;font-weight:bold;letter-spacing:1.5px;margin-bottom:6px;margin-top:14px}
input[type=number]{width:100%;padding:12px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:16px;font-family:sans-serif;color:#1A2864;outline:none}
.cat-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;margin-top:6px}
.cat-select-btn{padding:7px 14px;border-radius:20px;font-size:13px;font-family:sans-serif;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#64748b}
.cat-select-btn.active{border-color:#1A2864;background:#1A2864;color:white}
.sync-text{color:rgba(255,255,255,0.3);font-size:10px;font-family:sans-serif;margin-top:4px}
.alert{background:#fef3c7;border:1px solid #F0B400;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#92400e;font-family:sans-serif}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <span style="font-size:26px">🦶</span>
        <div>
          <div class="logo-text">PE NA AREIA</div>
          <div class="logo-sub">BARRACA 175 · ESTOQUE</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span id="online-dot" style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block"></span>
        <button onclick="exportCSV()" style="background:#F0B400;border:none;border-radius:8px;color:#1A2864;padding:6px 10px;font-size:11px;font-family:sans-serif;font-weight:bold;cursor:pointer">📥 CSV</button>
        <button onclick="loadData()" style="background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:white;padding:6px 10px;font-size:14px;cursor:pointer">🔄</button>
      </div>
    </div>
    <div class="sync-text" id="sync-text"></div>
    <div class="stats">
      <div class="stat"><div class="stat-v" style="color:#F0B400" id="s-custo">R$ 0,00</div><div class="stat-l">Custo Est.</div></div>
      <div class="stat"><div class="stat-v" style="color:#6ee7b7" id="s-venda">R$ 0,00</div><div class="stat-l">Pot. Venda</div></div>
      <div class="stat"><div class="stat-v" style="color:#93c5fd" id="s-margem">R$ 0,00</div><div class="stat-l">Margem</div></div>
      <div class="stat"><div class="stat-v" style="color:#fca5a5" id="s-grat">0</div><div class="stat-l">Cortesias</div></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="content" id="content"></div>
  <div class="nav">
    <button class="nav-btn active" onclick="showAba('est',this)" id="nav-est"><span class="nav-icon">📋</span><span class="nav-label">Estoque</span></button>
    <button class="nav-btn" onclick="showAba('his',this)" id="nav-his"><span class="nav-icon">🕐</span><span class="nav-label">Historico</span></button>
    <button class="nav-btn" onclick="showAba('res',this)" id="nav-res"><span class="nav-icon">📊</span><span class="nav-label">Resumo</span></button>
    <button class="nav-btn" onclick="showAba('prod',this)" id="nav-prod"><span class="nav-icon">⚙️</span><span class="nav-label">Produtos</span></button>
  </div>
</div>

<script>
const FB = "https://pna-estoque-default-rtdb.firebaseio.com";
const CI = {Sucos:"🥤",Bebidas:"🍺",Drinks:"🍹",Servicos:"🪑",Outros:"📦"};
const PD = [
  {id:1,nome:"Pink Lemonade",cat:"Sucos",est:0,custo:5.9,venda:12},
  {id:2,nome:"Abacaxi c/ Hortela",cat:"Sucos",est:0,custo:5.3,venda:12},
  {id:3,nome:"Caju",cat:"Sucos",est:0,custo:5.3,venda:12},
  {id:4,nome:"Laranja",cat:"Sucos",est:0,custo:5.3,venda:12},
  {id:5,nome:"Laranja Beterraba Cenoura",cat:"Sucos",est:0,custo:5.1,venda:12},
  {id:6,nome:"Verde",cat:"Sucos",est:0,custo:5.5,venda:12},
  {id:7,nome:"Cerveja Nacional",cat:"Bebidas",est:0,custo:5,venda:12},
  {id:8,nome:"Cerveja Outras",cat:"Bebidas",est:0,custo:7,venda:15},
  {id:9,nome:"Refrigerante",cat:"Bebidas",est:0,custo:3,venda:8},
  {id:10,nome:"Agua Mineral",cat:"Bebidas",est:0,custo:1.5,venda:5},
  {id:11,nome:"Agua de Coco",cat:"Bebidas",est:0,custo:5,venda:12},
  {id:12,nome:"Caipirinha",cat:"Drinks",est:0,custo:10,venda:30},
  {id:13,nome:"Caipivodka",cat:"Drinks",est:0,custo:12,venda:35},
  {id:14,nome:"Cadeira",cat:"Servicos",est:0,custo:0,venda:0}
];

let prods = [], hist = [], aba = "est", catFiltro = "Todos", modal = null;

const fR = v => "R$ " + Number(v).toFixed(2).replace(".",",");
const nS = () => new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});

async function fbGet(p){try{const r=await fetch(FB+"/"+p+".json");return await r.json();}catch{return null;}}
async function fbSet(p,d){try{await fetch(FB+"/"+p+".json",{method:"PUT",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});}catch{}}

function toast(msg, ok=true){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (ok ? "" : " err");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

async function loadData(){
  const p = await fbGet("produtos");
  const h = await fbGet("historico");
  prods = p ? Object.values(p).sort((a,b)=>a.id-b.id) : JSON.parse(JSON.stringify(PD));
  hist = h ? Object.values(h).sort((a,b)=>b.id-a.id) : [];
  document.getElementById("sync-text").textContent = "Sync " + new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  updateStats();
  render();
}

async function saveProds(){
  const o={};prods.forEach(x=>{o["p"+x.id]=x;});
  await fbSet("produtos",o);
}
async function saveHist(){
  const o={};hist.slice(0,200).forEach(x=>{o["h"+x.id]=x;});
  await fbSet("historico",o);
}

function updateStats(){
  const tC = prods.reduce((s,p)=>s+p.est*p.custo,0);
  const tV = prods.reduce((s,p)=>s+p.est*p.venda,0);
  const today = new Date().toLocaleDateString("pt-BR").slice(0,5);
  const gH = hist.filter(h=>h.grat&&h.quando&&h.quando.includes(today)).length;
  document.getElementById("s-custo").textContent = fR(tC);
  document.getElementById("s-venda").textContent = fR(tV);
  document.getElementById("s-margem").textContent = fR(tV-tC);
  document.getElementById("s-grat").textContent = gH;
}

function showAba(a, btn){
  aba = a;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  render();
}

function render(){
  updateStats();
  const c = document.getElementById("content");
  if(aba==="est") renderEst(c);
  else if(aba==="his") renderHis(c);
  else if(aba==="res") renderRes(c);
  else if(aba==="prod") renderProd(c);
}

function renderEst(c){
  const cats = ["Todos",...new Set(prods.map(p=>p.cat))];
  const pF = catFiltro==="Todos" ? prods : prods.filter(p=>p.cat===catFiltro);
  const zerados = prods.filter(p=>p.est===0&&p.cat!=="Servicos");
  const baixos = prods.filter(p=>p.est>0&&p.est<=5);
  let h = "";
  if(zerados.length||baixos.length){
    h += '<div class="alert">';
    if(zerados.length) h += "🔴 "+zerados.length+" produto(s) zerado(s)<br>";
    if(baixos.length) h += "🟡 "+baixos.length+" com estoque baixo (≤5)";
    h += "</div>";
  }
  h += '<div class="cat-bar">';
  cats.forEach(cat=>{
    const label = cat==="Todos"?"Todos":((CI[cat]||"📦")+" "+cat);
    h += `<button class="cat-btn${catFiltro===cat?" active":""}" onclick="setCat('${cat}')">${label}</button>`;
  });
  h += "</div>";
  pF.forEach(p=>{
    const cls = p.est===0?"zero":p.est<=5?"low":"";
    const cor = p.est===0?"#ef4444":p.est<=5?"#f59e0b":"#10b981";
    h += `<div class="card ${cls}" onclick="openMov(${p.id})">
      <div>
        <div class="card-name">${CI[p.cat]||"📦"} ${p.nome}</div>
        <div class="card-sub">Custo ${fR(p.custo)} · Venda ${fR(p.venda)}</div>
      </div>
      <div style="text-align:right">
        <div class="card-qty" style="color:${cor}">${p.est}</div>
        <div class="card-un">un</div>
      </div>
    </div>`;
  });
  h += `<button class="add-btn" onclick="openEdit(null)">+ Adicionar produto</button>`;
  c.innerHTML = h;
}

function renderHis(c){
  let h = `<div class="section-title">Historico</div>`;
  if(!hist.length){ h += '<div style="text-align:center;color:#94a3b8;font-family:sans-serif;margin-top:60px">Nenhuma movimentacao ainda.</div>'; }
  else {
    hist.forEach(x=>{
      const cls = x.grat?"grat":x.tipo==="e"?"":"saida";
      const cor = x.grat?"#F0B400":x.tipo==="e"?"#10b981":"#ef4444";
      const sinal = x.tipo==="e"?"+":"−";
      h += `<div class="hist-card ${cls}">
        <div>
          <div class="hist-nome">${x.nome} ${x.grat?"🎁":""}</div>
          <div class="hist-meta">${x.quando} · ${x.quem}${x.obs?" · "+x.obs:""}</div>
        </div>
        <div class="hist-qty" style="color:${cor}">${sinal}${x.qtd}</div>
      </div>`;
    });
  }
  c.innerHTML = h;
}

function renderRes(c){
  const tC = prods.reduce((s,p)=>s+p.est*p.custo,0);
  const tV = prods.reduce((s,p)=>s+p.est*p.venda,0);
  const today = new Date().toLocaleDateString("pt-BR").slice(0,5);
  const gH = hist.filter(h=>h.grat&&h.quando&&h.quando.includes(today)).length;
  const zerados = prods.filter(p=>p.est===0&&p.cat!=="Servicos");
  let h = `<div class="section-title">Resumo</div>`;
  const items=[
    {l:"Custo do estoque",v:fR(tC),i:"📦",c:"#1A2864"},
    {l:"Potencial de venda",v:fR(tV),i:"💰",c:"#10b981"},
    {l:"Margem potencial",v:fR(tV-tC),i:"📈",c:"#1A78C8"},
    {l:"Cortesias hoje",v:gH+" registro(s)",i:"🎁",c:"#F0B400"}
  ];
  items.forEach(x=>{
    h += `<div class="res-card"><span class="res-icon">${x.i}</span><div><div class="res-label">${x.l}</div><div class="res-val" style="color:${x.c}">${x.v}</div></div></div>`;
  });
  if(zerados.length){
    h += '<div style="font-size:12px;font-weight:bold;color:#ef4444;margin:10px 0 8px;font-family:sans-serif">🔴 Repor urgente:</div>';
    zerados.forEach(p=>{
      h += `<div style="background:#fef2f2;border-radius:8px;padding:9px 12px;margin-bottom:5px;font-size:13px;color:#1A2864;font-family:sans-serif">${CI[p.cat]||"📦"} ${p.nome}</div>`;
    });
  }
  c.innerHTML = h;
}

function renderProd(c){
  let h = `<div class="section-title">Gerenciar Produtos</div>`;
  prods.forEach(p=>{
    h += `<div class="prod-card">
      <div style="flex:1">
        <div style="font-weight:bold;font-size:13px;color:#1A2864">${CI[p.cat]||"📦"} ${p.nome}</div>
        <div style="font-size:11px;color:#94a3b8;font-family:sans-serif">${p.cat} · Custo ${fR(p.custo)} · Venda ${fR(p.venda)}</div>
      </div>
      <button class="edit-btn" onclick="openEdit(${p.id})">✏️</button>
      <button class="del-btn" onclick="delProd(${p.id})">🗑️</button>
    </div>`;
  });
  h += `<button class="add-btn" onclick="openEdit(null)">+ Adicionar produto</button>`;
  c.innerHTML = h;
}

function setCat(cat){ catFiltro=cat; render(); }

// ── MOV MODAL ──
let movState = {tipo:"s",qtd:1,grat:false,obs:"",quem:"Joao Mauricio",prod:null};

function openMov(id){
  movState = {tipo:"s",qtd:1,grat:false,obs:"",quem:"Joao Mauricio",prod:prods.find(p=>p.id===id)};
  renderMovModal();
}

function renderMovModal(){
  const p = movState.prod;
  const cor = p.est===0?"#ef4444":"#10b981";
  const bg = movState.grat?"#F0B400":movState.tipo==="e"?"#10b981":"#1A2864";
  const btnLabel = movState.grat?`🎁 Cortesia (${movState.qtd}x)`:movState.tipo==="e"?`✓ Adicionar ${movState.qtd} ao estoque`:`✓ Registrar saida de ${movState.qtd}`;
  const html = `
  <div class="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <div class="modal-title">${p.nome}</div>
        <div class="modal-sub">Est: <strong style="color:${cor}">${p.est}</strong> · Custo ${fR(p.custo)} · Venda ${fR(p.venda)}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="edit-btn-sm" onclick="closeModal();openEdit(${p.id})">✏️</button>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="tipo-btns">
      <button class="tipo-btn${movState.tipo==="s"?" active-s":""}" onclick="setTipo('s')">💸 Saida</button>
      <button class="tipo-btn${movState.tipo==="e"?" active-e":""}" onclick="setTipo('e')">📦 Entrada</button>
    </div>
    <div class="qtd-area">
      <div class="qtd-row">
        <button class="qtd-btn" style="background:${movState.qtd===0?"#f1f5f9":"#fee2e2"};color:${movState.qtd===0?"#cbd5e1":"#ef4444"}" onclick="addQtd(-1)">−</button>
        <div class="qtd-num">${movState.qtd}</div>
        <button class="qtd-btn" style="background:#dcfce7;color:#16a34a" onclick="addQtd(1)">+</button>
      </div>
      ${movState.tipo==="e"?`<div style="text-align:center;font-size:10px;color:#94a3b8;font-family:sans-serif;margin-bottom:8px">ADICIONAR RAPIDO</div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="addQtd(6)">+6</button>
        <button class="quick-btn" onclick="addQtd(12)">+12</button>
        <button class="quick-btn" onclick="addQtd(24)">+24</button>
      </div>`:""}
    </div>
    ${movState.tipo==="s"?`<div class="grat-toggle${movState.grat?" on":""}" onclick="toggleGrat()">
      <span style="font-size:22px">🎁</span>
      <div style="flex:1;font-family:sans-serif;font-size:13px;color:${movState.grat?"#92400e":"#64748b"}">${movState.grat?"Cortesia ativada":"Marcar como cortesia"}</div>
      <div class="grat-circle${movState.grat?" on"}">${movState.grat?"✓":""}</div>
    </div>`:""}
    <select onchange="movState.quem=this.value">
      ${["Joao Mauricio","Pedro","Funcionario 1","Funcionario 2"].map(n=>`<option${movState.quem===n?" selected":""}>${n}</option>`).join("")}
    </select>
    <input type="text" placeholder="Observacao (opcional)" value="${movState.obs}" oninput="movState.obs=this.value">
    <button class="confirm-btn" style="background:${bg}" onclick="confirmMov()">${btnLabel}</button>
  </div></div>`;
  showModal(html);
}

function setTipo(t){ movState.tipo=t; movState.qtd=1; movState.grat=false; renderMovModal(); }
function addQtd(n){ 
  const max = movState.tipo==="s" ? movState.prod.est : 999;
  movState.qtd = Math.min(max, Math.max(0, movState.qtd+n)); 
  renderMovModal(); 
}
function toggleGrat(){ movState.grat=!movState.grat; renderMovModal(); }

async function confirmMov(){
  const {prod,tipo,qtd,obs,grat,quem} = movState;
  if(!qtd||qtd<=0){toast("Selecione 1+",false);return;}
  prods = prods.map(p=>{
    if(p.id!==prod.id)return p;
    return{...p,est:tipo==="e"?p.est+qtd:Math.max(0,p.est-qtd)};
  });
  await saveProds();
  const r={id:Date.now(),nome:prod.nome,cat:prod.cat,tipo,qtd,grat:grat||false,obs:obs||"",quem,quando:nS()};
  hist=[r,...hist].slice(0,200);
  await saveHist();
  closeModal();
  updateStats();
  render();
  toast(grat?"🎁 Cortesia: "+qtd+"x "+prod.nome:tipo==="e"?"+"+qtd+" "+prod.nome+" ✓":"-"+qtd+" "+prod.nome+" ✓");
}

// ── EDIT MODAL ──
let editState = {id:null,nome:"",cat:"Outros",custo:"",venda:""};

function openEdit(id){
  if(id){
    const p = prods.find(x=>x.id===id);
    editState = {id:p.id,nome:p.nome,cat:p.cat,custo:p.custo,venda:p.venda};
  } else {
    editState = {id:null,nome:"",cat:"Outros",custo:"",venda:""};
  }
  renderEditModal();
}

function renderEditModal(){
  const isNew = !editState.id;
  const cats = ["Sucos","Bebidas","Drinks","Servicos","Outros"];
  const html = `
  <div class="modal-bg" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-weight:bold;font-size:18px;color:#1A2864">${isNew?"Novo Produto":"Editar Produto"}</div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="field-label">NOME</div>
    <input type="text" placeholder="Ex: Maracuja" value="${editState.nome}" oninput="editState.nome=this.value">
    <div class="field-label">CUSTO (R$)</div>
    <input type="number" placeholder="0,00" value="${editState.custo}" oninput="editState.custo=this.value">
    <div class="field-label">PRECO DE VENDA (R$)</div>
    <input type="number" placeholder="0,00" value="${editState.venda}" oninput="editState.venda=this.value">
    <div class="field-label">CATEGORIA</div>
    <div class="cat-select">
      ${cats.map(c=>`<button class="cat-select-btn${editState.cat===c?" active":""}" onclick="setEditCat('${c}')">${CI[c]||"📦"} ${c}</button>`).join("")}
    </div>
    <button class="confirm-btn" style="background:#1A2864" onclick="saveEdit()">${isNew?"✓ Adicionar Produto":"✓ Salvar Alteracoes"}</button>
  </div></div>`;
  showModal(html);
}

function setEditCat(c){ editState.cat=c; renderEditModal(); }

async function saveEdit(){
  if(!editState.nome.trim()){toast("Digite um nome",false);return;}
  if(editState.id){
    prods = prods.map(p=>p.id===editState.id?{...p,nome:editState.nome,cat:editState.cat,custo:Number(editState.custo)||0,venda:Number(editState.venda)||0}:p);
    toast("Produto atualizado!");
  } else {
    prods.push({id:Date.now(),nome:editState.nome,cat:editState.cat,est:0,custo:Number(editState.custo)||0,venda:Number(editState.venda)||0});
    toast(editState.nome+" adicionado!");
  }
  await saveProds();
  closeModal();
  render();
}

async function delProd(id){
  const p = prods.find(x=>x.id===id);
  if(!confirm("Remover "+p.nome+"?"))return;
  prods = prods.filter(x=>x.id!==id);
  await saveProds();
  toast(p.nome+" removido.");
  render();
}

function showModal(html){
  let m = document.getElementById("modal-root");
  if(!m){m=document.createElement("div");m.id="modal-root";document.body.appendChild(m);}
  m.innerHTML = html;
}
function closeModal(){
  const m = document.getElementById("modal-root");
  if(m) m.innerHTML="";
}

function exportCSV(){
  const esc=v=>{const s=String(v??"");return(s.includes(",")||s.includes('"')||s.includes("\n"))?'"'+s.replace(/"/g,'""')+'"':s;};
  const dl=(name,rows)=>{
    const csv="\uFEFF"+rows.map(r=>r.map(esc).join(",")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
    const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
  };
  const d=new Date().toLocaleDateString("pt-BR").replace(/\//g,"-");
  dl("pna-estoque-"+d+".csv",[
    ["Pe na Areia - "+new Date().toLocaleString("pt-BR")],[],
    ["Produto","Cat","Estoque","Custo","Venda","Val.Estoque","Receita","Margem"],
    ...prods.map(p=>[p.nome,p.cat,p.est,p.custo,p.venda,(p.est*p.custo).toFixed(2),(p.est*p.venda).toFixed(2),(p.est*(p.venda-p.custo)).toFixed(2)]),
  ]);
  setTimeout(()=>dl("pna-historico-"+d+".csv",[
    ["Historico - "+new Date().toLocaleString("pt-BR")],[],
    ["Data","Produto","Cat","Tipo","Qtd","Cortesia","Quem","Obs"],
    ...hist.map(h=>[h.quando,h.nome,h.cat,h.tipo==="e"?"Entrada":"Saida",h.qtd,h.grat?"Sim":"Nao",h.quem,h.obs||""]),
  ]),600);
  toast("📥 Baixando CSV...");
}

window.addEventListener("online",()=>document.getElementById("online-dot").style.background="#4ade80");
window.addEventListener("offline",()=>document.getElementById("online-dot").style.background="#ef4444");

loadData();
setInterval(loadData, 20000);
</script>
