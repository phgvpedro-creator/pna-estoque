<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/><meta name="theme-color" content="#1A2864"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-title" content="Pe na Areia"/><title>Pe na Areia</title><style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:Georgia,serif;background:#FAF3EA;overscroll-behavior:none}::-webkit-scrollbar{display:none}#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:70px}.hdr{background:#1A2864;padding:14px 16px;position:sticky;top:0;z-index:10}.hdr-top{display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:10px}.logo-t{color:white;font-weight:bold;font-size:16px;letter-spacing:1px}.logo-s{color:#F0B400;font-size:9px;letter-spacing:2px}.stats{display:flex;gap:6px;margin-top:10px}.stat{flex:1;background:rgba(255,255,255,0.08);border-radius:8px;padding:6px 4px;text-align:center}.sv{font-weight:bold;font-size:11px;font-family:sans-serif}.sl{color:rgba(255,255,255,0.4);font-size:8px;font-family:sans-serif}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;border-top:1px solid #e2e8f0;display:flex;z-index:20}.nb{flex:1;padding:10px 4px 8px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border-top:3px solid transparent;font-family:sans-serif}.nb.on{border-top-color:#F0B400}.nb.on span:last-child{color:#1A2864;font-weight:bold}.ni{font-size:20px}.nl{font-size:10px;color:#94a3b8}.content{padding:14px}.card{background:white;border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-left:4px solid #10b981}.card.z{border-left-color:#ef4444}.card.lo{border-left-color:#f59e0b}.cn{font-weight:bold;font-size:14px;color:#1A2864}.cs{font-size:11px;color:#94a3b8;font-family:sans-serif;margin-top:3px}.cq{font-size:28px;font-weight:bold;font-family:sans-serif;line-height:1}.cu{font-size:10px;color:#94a3b8;font-family:sans-serif;text-align:right}.cbar{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}.cb{background:white;color:#1A2864;border:1.5px solid #1A2864;border-radius:20px;padding:5px 12px;font-size:11px;white-space:nowrap;font-family:sans-serif;cursor:pointer}.cb.on{background:#1A2864;color:white;font-weight:bold}.mb{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center}.md{background:white;border-radius:24px 24px 0 0;padding:22px 20px 44px;width:100%;max-width:430px}.mt{font-weight:bold;font-size:18px;color:#1A2864}.ms2{font-size:12px;color:#94a3b8;font-family:sans-serif;margin-top:2px}.tb{display:flex;gap:8px;margin:16px 0}.tbtn{flex:1;padding:12px;border-radius:12px;border:none;font-family:sans-serif;font-size:14px;font-weight:bold;background:#f1f5f9;color:#94a3b8;cursor:pointer}.tbtn.s{background:#1A2864;color:white}.tbtn.e{background:#10b981;color:white}.qa{background:#f8fafc;border-radius:14px;padding:18px 16px;margin-bottom:14px}.qr{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:14px}.qb{width:56px;height:56px;border-radius:50%;border:none;font-size:28px;font-weight:bold;cursor:pointer}.qn{font-size:52px;font-weight:bold;color:#1A2864;font-family:sans-serif;min-width:80px;text-align:center;line-height:1}.qrp{display:flex;gap:8px}.qrb{flex:1;padding:10px 0;border-radius:10px;border:1.5px solid #1A2864;background:white;color:#1A2864;font-size:15px;font-weight:bold;font-family:sans-serif;cursor:pointer}.gt{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid #e2e8f0;background:#f8fafc;margin-bottom:14px;cursor:pointer}.gt.on{background:#fef3c7;border-color:#F0B400}.gc{width:24px;height:24px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:white}.gc.on{background:#F0B400}select,input[type=text]{width:100%;padding:11px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:14px;font-family:sans-serif;color:#1A2864;outline:none;margin-bottom:10px}.cfm{width:100%;padding:15px;border-radius:14px;color:white;border:none;font-size:16px;font-weight:bold;font-family:sans-serif;cursor:pointer;margin-top:6px}.hc{background:white;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid #10b981}.hc.s{border-left-color:#ef4444}.hc.g{border-left-color:#F0B400}.hn{font-weight:bold;font-size:13px;color:#1A2864}.hm{font-size:11px;color:#94a3b8;font-family:sans-serif;margin-top:2px}.rc{background:white;border-radius:12px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:10px;display:flex;align-items:center;gap:12px}.pc{background:white;border-radius:12px;padding:12px 14px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:8px;display:flex;align-items:center;gap:10px}.eb{background:#1A78C8;border:none;border-radius:8px;color:white;padding:7px 11px;font-size:13px;cursor:pointer}.db{background:#fef2f2;border:none;border-radius:8px;color:#ef4444;padding:7px 11px;font-size:13px;cursor:pointer}.ab{width:100%;margin-top:14px;padding:14px;border-radius:12px;background:white;border:2px dashed #1A2864;color:#1A2864;font-size:14px;font-family:sans-serif;cursor:pointer}.ts{position:fixed;top:110px;left:50%;transform:translateX(-50%);border-radius:20px;padding:10px 20px;font-size:13px;z-index:999;font-family:sans-serif;white-space:nowrap;display:none}.ok{background:#065f46;color:white}.er{background:#7f1d1d;color:white}.st2{font-size:17px;font-weight:bold;color:#1A2864;margin-bottom:14px}.fl{font-size:10px;color:#94a3b8;font-family:sans-serif;font-weight:bold;letter-spacing:1.5px;margin-bottom:6px;margin-top:14px}input[type=number]{width:100%;padding:12px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:16px;font-family:sans-serif;color:#1A2864;outline:none}.cs2{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;margin-bottom:20px}.csb{padding:7px 14px;border-radius:20px;font-size:13px;font-family:sans-serif;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#64748b}.csb.on{border-color:#1A2864;background:#1A2864;color:white}.al{background:#fef3c7;border:1px solid #F0B400;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#92400e;font-family:sans-serif}.mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}.xb{background:#f1f5f9;border:none;border-radius:10px;padding:7px 12px;font-size:16px;cursor:pointer}</style></head><body><div id="app"><div class="hdr"><div class="hdr-top"><div class="logo"><span style="font-size:26px">🦶</span><div><div class="logo-t">PE NA AREIA</div><div class="logo-s">BARRACA 175 · ESTOQUE</div></div></div><div style="display:flex;gap:6px;align-items:center"><span id="od" style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block"></span><button onclick="exportCSV()" style="background:#F0B400;border:none;border-radius:8px;color:#1A2864;padding:6px 10px;font-size:11px;font-family:sans-serif;font-weight:bold;cursor:pointer">📥 CSV</button><button onclick="loadData()" style="background:rgba(255,255,255,0.1);border:none;border-radius:8px;color:white;padding:6px 10px;font-size:14px;cursor:pointer">🔄</button></div></div><div id="st" style="color:rgba(255,255,255,0.3);font-size:10px;font-family:sans-serif;margin-top:4px"></div><div class="stats"><div class="stat"><div class="sv" style="color:#F0B400" id="sc">R$ 0,00</div><div class="sl">Custo</div></div><div class="stat"><div class="sv" style="color:#6ee7b7" id="sv">R$ 0,00</div><div class="sl">Venda</div></div><div class="stat"><div class="sv" style="color:#93c5fd" id="sm">R$ 0,00</div><div class="sl">Margem</div></div><div class="stat"><div class="sv" style="color:#fca5a5" id="sg">0</div><div class="sl">Cortesias</div></div></div></div><div id="ts" class="ts"></div><div class="content" id="ct"></div><div class="nav"><button class="nb on" onclick="go('est',this)"><span class="ni">📋</span><span class="nl">Estoque</span></button><button class="nb" onclick="go('his',this)"><span class="ni">🕐</span><span class="nl">Historico</span></button><button class="nb" onclick="go('res',this)"><span class="ni">📊</span><span class="nl">Resumo</span></button><button class="nb" onclick="go('prod',this)"><span class="ni">⚙️</span><span class="nl">Produtos</span></button></div></div><div id="mr"></div><script>const FB="https://pna-estoque-default-rtdb.firebaseio.com";const CI={Sucos:"🥤",Bebidas:"🍺",Drinks:"🍹",Servicos:"🪑",Outros:"📦"};const PD=[{id:1,nome:"Pink Lemonade",cat:"Sucos",est:0,custo:5.9,venda:12},{id:2,nome:"Abacaxi c/ Hortela",cat:"Sucos",est:0,custo:5.3,venda:12},{id:3,nome:"Caju",cat:"Sucos",est:0,custo:5.3,venda:12},{id:4,nome:"Laranja",cat:"Sucos",est:0,custo:5.3,venda:12},{id:5,nome:"Laranja Beterraba Cenoura",cat:"Sucos",est:0,custo:5.1,venda:12},{id:6,nome:"Verde",cat:"Sucos",est:0,custo:5.5,venda:12},{id:7,nome:"Cerveja Nacional",cat:"Bebidas",est:0,custo:5,venda:12},{id:8,nome:"Cerveja Outras",cat:"Bebidas",est:0,custo:7,venda:15},{id:9,nome:"Refrigerante",cat:"Bebidas",est:0,custo:3,venda:8},{id:10,nome:"Agua Mineral",cat:"Bebidas",est:0,custo:1.5,venda:5},{id:11,nome:"Agua de Coco",cat:"Bebidas",est:0,custo:5,venda:12},{id:12,nome:"Caipirinha",cat:"Drinks",est:0,custo:10,venda:30},{id:13,nome:"Caipivodka",cat:"Drinks",est:0,custo:12,venda:35},{id:14,nome:"Cadeira",cat:"Servicos",est:0,custo:0,venda:0}];let P=[],H=[],aba="est",cf="Todos",ms={tipo:"s",qtd:1,grat:false,obs:"",quem:"Joao Mauricio",prod:null},es={id:null,nome:"",cat:"Outros",custo:"",venda:""};const fR=v=>"R$ "+Number(v).toFixed(2).replace(".",",");const nS=()=>new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});async function fG(p){try{const r=await fetch(FB+"/"+p+".json");return await r.json();}catch{return null;}}async function fS(p,d){try{await fetch(FB+"/"+p+".json",{method:"PUT",body:JSON.stringify(d),headers:{"Content-Type":"application/json"}});}catch{}}function toast(m,ok=true){const t=document.getElementById("ts");t.textContent=m;t.className="ts "+(ok?"ok":"er");t.style.display="block";setTimeout(()=>t.style.display="none",2500);}async function loadData(){const p=await fG("produtos");const h=await fG("historico");P=p?Object.values(p).sort((a,b)=>a.id-b.id):JSON.parse(JSON.stringify(PD));H=h?Object.values(h).sort((a,b)=>b.id-a.id):[];document.getElementById("st").textContent="Sync "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});updS();render();}async function sP(){const o={};P.forEach(x=>{o["p"+x.id]=x;});await fS("produtos",o);}async function sH(){const o={};H.slice(0,200).forEach(x=>{o["h"+x.id]=x;});await fS("historico",o);}function updS(){const tC=P.reduce((s,p)=>s+p.est*p.custo,0);const tV=P.reduce((s,p)=>s+p.est*p.venda,0);const td=new Date().toLocaleDateString("pt-BR").slice(0,5);const gH=H.filter(h=>h.grat&&h.quando&&h.quando.includes(td)).length;document.getElementById("sc").textContent=fR(tC);document.getElementById("sv").textContent=fR(tV);document.getElementById("sm").textContent=fR(tV-tC);document.getElementById("sg").textContent=gH;}function go(a,btn){aba=a;document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));if(btn)btn.classList.add("on");render();}function render(){updS();const c=document.getElementById("ct");if(aba==="est")rEst(c);else if(aba==="his")rHis(c);else if(aba==="res")rRes(c);else rProd(c);}function rEst(c){const cats=["Todos",...new Set(P.map(p=>p.cat))];const pF=cf==="Todos"?P:P.filter(p=>p.cat===cf);const z=P.filter(p=>p.est===0&&p.cat!=="Servicos");const lo=P.filter(p=>p.est>0&&p.est<=5);let h="";if(z.length||lo.length){h+='<div class="al">';if(z.length)h+="🔴 "+z.length+" produto(s) zerado(s)<br>";if(lo.length)h+="🟡 "+lo.length+" com estoque baixo";h+="</div>";}h+='<div class="cbar">';cats.forEach(cat=>{const l=cat==="Todos"?"Todos":((CI[cat]||"📦")+" "+cat);h+=`<button class="cb${cf===cat?" on":""}" onclick="setCat('${cat}')">${l}</button>`;});h+="</div>";pF.forEach(p=>{const co=p.est===0?"#ef4444":p.est<=5?"#f59e0b":"#10b981";const cl=p.est===0?"z":p.est<=5?"lo":"";h+=`<div class="card ${cl}" onclick="oMov(${p.id})"><div><div class="cn">${CI[p.cat]||"📦"} ${p.nome}</div><div class="cs">Custo ${fR(p.custo)} · Venda ${fR(p.venda)}</div></div><div style="text-align:right"><div class="cq" style="color:${co}">${p.est}</div><div class="cu">un</div></div></div>`;});h+=`<button class="ab" onclick="oEdit(null)">+ Adicionar produto</button>`;c.innerHTML=h;}function rHis(c){let h='<div class="st2">Historico</div>';if(!H.length){h+='<div style="text-align:center;color:#94a3b8;font-family:sans-serif;margin-top:60px">Nenhuma movimentacao ainda.</div>';}else{H.forEach(x=>{const cl=x.grat?"g":x.tipo==="e"?"":"s";const co=x.grat?"#F0B400":x.tipo==="e"?"#10b981":"#ef4444";const si=x.tipo==="e"?"+":"−";h+=`<div class="hc ${cl}"><div><div class="hn">${x.nome} ${x.grat?"🎁":""}</div><div class="hm">${x.quando} · ${x.quem}${x.obs?" · "+x.obs:""}</div></div><div style="font-weight:bold;font-size:16px;font-family:sans-serif;color:${co}">${si}${x.qtd}</div></div>`;});}c.innerHTML=h;}function rRes(c){const tC=P.reduce((s,p)=>s+p.est*p.custo,0);const tV=P.reduce((s,p)=>s+p.est*p.venda,0);const td=new Date().toLocaleDateString("pt-BR").slice(0,5);const gH=H.filter(h=>h.grat&&h.quando&&h.quando.includes(td)).length;const z=P.filter(p=>p.est===0&&p.cat!=="Servicos");let h='<div class="st2">Resumo</div>';[{l:"Custo do estoque",v:fR(tC),i:"📦",c:"#1A2864"},{l:"Potencial de venda",v:fR(tV),i:"💰",c:"#10b981"},{l:"Margem potencial",v:fR(tV-tC),i:"📈",c:"#1A78C8"},{l:"Cortesias hoje",v:gH+" reg.",i:"🎁",c:"#F0B400"}].forEach(x=>{h+=`<div class="rc"><span style="font-size:26px">${x.i}</span><div><div style="font-size:11px;color:#94a3b8;font-family:sans-serif">${x.l}</div><div style="font-size:20px;font-weight:bold;color:${x.c};font-family:sans-serif">${x.v}</div></div></div>`;});if(z.length){h+='<div style="font-size:12px;font-weight:bold;color:#ef4444;margin:10px 0 8px;font-family:sans-serif">🔴 Repor urgente:</div>';z.forEach(p=>{h+=`<div style="background:#fef2f2;border-radius:8px;padding:9px 12px;margin-bottom:5px;font-size:13px;color:#1A2864;font-family:sans-serif">${CI[p.cat]||"📦"} ${p.nome}</div>`;});}c.innerHTML=h;}function rProd(c){let h='<div class="st2">Gerenciar Produtos</div>';P.forEach(p=>{h+=`<div class="pc"><div style="flex:1"><div style="font-weight:bold;font-size:13px;color:#1A2864">${CI[p.cat]||"📦"} ${p.nome}</div><div style="font-size:11px;color:#94a3b8;font-family:sans-serif">${p.cat} · ${fR(p.custo)} · ${fR(p.venda)}</div></div><button class="eb" onclick="oEdit(${p.id})">✏️</button><button class="db" onclick="dProd(${p.id})">🗑️</button></div>`;});h+=`<button class="ab" onclick="oEdit(null)">+ Adicionar produto</button>`;c.innerHTML=h;}function setCat(cat){cf=cat;render();}function oMov(id){ms={tipo:"s",qtd:1,grat:false,obs:"",quem:"Joao Mauricio",prod:P.find(p=>p.id===id)};rMov();}function rMov(){const p=ms.prod;const co=p.est===0?"#ef4444":"#10b981";const bg=ms.grat?"#F0B400":ms.tipo==="e"?"#10b981":"#1A2864";const bl=ms.grat?`🎁 Cortesia (${ms.qtd}x)`:ms.tipo==="e"?`✓ Adicionar ${ms.qtd} ao estoque`:`✓ Registrar saida de ${ms.qtd}`;document.getElementById("mr").innerHTML=`<div class="mb" onclick="cModal()"><div class="md" onclick="event.stopPropagation()"><div class="mh"><div><div class="mt">${p.nome}</div><div class="ms2">Est: <strong style="color:${co}">${p.est}</strong> · ${fR(p.custo)} → ${fR(p.venda)}</div></div><div style="display:flex;gap:8px"><button class="xb" onclick="cModal();oEdit(${p.id})">✏️</button><button class="xb" onclick="cModal()">✕</button></div></div><div class="tb"><button class="tbtn${ms.tipo==="s"?" s":""}" onclick="setT('s')">💸 Saida</button><button class="tbtn${ms.tipo==="e"?" e":""}" onclick="setT('e')">📦 Entrada</button></div><div class="qa"><div class="qr"><button class="qb" style="background:${ms.qtd===0?"#f1f5f9":"#fee2e2"};color:${ms.qtd===0?"#cbd5e1":"#ef4444"}" onclick="aQ(-1)">−</button><div class="qn">${ms.qtd}</div><button class="qb" style="background:#dcfce7;color:#16a34a" onclick="aQ(1)">+</button></div>${ms.tipo==="e"?`<div style="text-align:center;font-size:10px;color:#94a3b8;font-family:sans-serif;margin-bottom:8px">ADICIONAR RAPIDO</div><div class="qrp"><button class="qrb" onclick="aQ(6)">+6</button><button class="qrb" onclick="aQ(12)">+12</button><button class="qrb" onclick="aQ(24)">+24</button></div>`:""}</div>${ms.tipo==="s"?`<div class="gt${ms.grat?" on":""}" onclick="tGrat()"><span style="font-size:22px">🎁</span><div style="flex:1;font-family:sans-serif;font-size:13px;color:${ms.grat?"#92400e":"#64748b"}">${ms.grat?"Cortesia ativada":"Marcar como cortesia"}</div><div class="gc${ms.grat?" on"}">${ms.grat?"✓":""}</div></div>`:""}<select onchange="ms.quem=this.value">${["Joao Mauricio","Pedro","Funcionario 1","Funcionario 2"].map(n=>`<option${ms.quem===n?" selected":""}>${n}</option>`).join("")}</select><input type="text" placeholder="Obs (opcional)" value="${ms.obs}" oninput="ms.obs=this.value"><button class="cfm" style="background:${bg}" onclick="confMov()">${bl}</button></div></div>`;}function setT(t){ms.tipo=t;ms.qtd=1;ms.grat=false;rMov();}function aQ(n){const mx=ms.tipo==="s"?ms.prod.est:999;ms.qtd=Math.min(mx,Math.max(0,ms.qtd+n));rMov();}function tGrat(){ms.grat=!ms.grat;rMov();}async function confMov(){const{prod,tipo,qtd,obs,grat,quem}=ms;if(!qtd||qtd<=0){toast("Selecione 1+",false);return;}P=P.map(p=>{if(p.id!==prod.id)return p;return{...p,est:tipo==="e"?p.est+qtd:Math.max(0,p.est-qtd)};});a
